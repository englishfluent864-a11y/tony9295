name: Render Video

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix:   ${{ steps.discover.outputs.matrix }}
      has_work: ${{ steps.discover.outputs.has_work }}

    steps:
      - name: Install gdown
        run: pip install gdown --break-system-packages

      - name: Discover videos in Drive folder
        id: discover
        run: |
          python3 - << 'PYEOF'
          import json
          import os
          import sys
          import time
          from pathlib import Path
          import gdown

          MLIGHT2_FOLDER = "1vXLbhQ-f4D-clk_NYxjHn6dhG7L8S7j5"
          TMP_DIR = Path("/tmp/discover")
          TMP_DIR.mkdir(parents=True, exist_ok=True)

          print("Downloading folder to discover videos...")

          for attempt in range(1, 4):
              try:
                  gdown.download_folder(
                      id=MLIGHT2_FOLDER,
                      output=str(TMP_DIR),
                      quiet=False,
                  )
                  break
              except Exception as e:
                  print(f"Attempt {attempt}/3 failed: {e}")
                  if attempt == 3:
                      print("ERROR: All folder-download attempts failed.", file=sys.stderr)
                      sys.exit(1)
                  wait = 30 * attempt
                  print(f"Waiting {wait}s before retry...")
                  time.sleep(wait)

          videos = sorted(
              p for p in TMP_DIR.rglob("*")
              if p.suffix.lower() == ".mp4"
          )

          if not videos:
              print("ERROR: No .mp4 files found in Drive folder.", file=sys.stderr)
              sys.exit(1)

          print(f"\nFound {len(videos)} video(s):")
          for v in videos:
              print(f"  {v.name}")

          matrix = {
              "include": [
                  {"video_name": v.name, "video_id": ""}
                  for v in videos
              ]
          }

          gh_out = os.environ["GITHUB_OUTPUT"]
          with open(gh_out, "a") as f:
              f.write(f"matrix={json.dumps(matrix)}\n")
              f.write("has_work=true\n")

          print("Matrix written to GITHUB_OUTPUT.")
          PYEOF

  render:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk before cleanup ==="
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" \
            /usr/local/share/powershell \
            /usr/share/swift \
            || true
          sudo apt-get clean -qq
          docker system prune -af --volumes || true
          echo "=== Disk after cleanup ==="
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu
          pip install gdown --break-system-packages
          echo "ffmpeg: $(ffmpeg -version 2>&1 | head -1)"
          echo "gdown:  $(pip show gdown | grep Version)"

      - name: Render video
        id: render
        env:
          TARGET_VIDEO_NAME: ${{ matrix.video_name }}
          TARGET_VIDEO_ID:   ${{ matrix.video_id }}
        run: python3 render.py

      - name: Create release tag
        id: tag
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SAFE=$(echo "${{ matrix.video_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="video-${TS}-${SAFE}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ matrix.video_name }} — ${{ steps.render.outputs.final_size_mb }} MB"
          body: |
            ## Rendered Video

            | Field | Value |
            |---|---|
            | **Source video** | `${{ matrix.video_name }}` |
            | **Final size** | ${{ steps.render.outputs.final_size_mb }} MB |
            | **Duration rendered** | ${{ steps.render.outputs.duration_seconds }}s |
            | **Bitrate used** | ${{ steps.render.outputs.video_bitrate_k }}k |
            | **Stop reason** | ${{ steps.render.outputs.stop_reason }} |
            | **Workflow run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Click the file under **Assets** below to download.
          files: ${{ steps.render.outputs.output_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
